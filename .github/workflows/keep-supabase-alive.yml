name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.SUPABASE_URL }}/auth/v1/health")
          
          echo "HTTP Status: $response"
          
          if [ "$response" -gt 0 ]; then
            echo "✅ Supabase está activo (status: $response)"
          else
            echo "❌ No se pudo contactar Supabase"
            exit 1
          fi
