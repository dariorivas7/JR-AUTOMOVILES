name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */3 * *'  # Se ejecuta cada 3 días al mediodía UTC
  workflow_dispatch:          # Permite ejecutarlo manualmente también

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          echo "HTTP Status: $response"
          
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Supabase está activo"
          else
            echo "❌ Error al contactar Supabase (status: $response)"
            exit 1
          fi
